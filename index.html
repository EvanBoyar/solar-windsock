<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solar Windsock</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  :root {
    color-scheme: dark;
    --bg: #0b1020;
    --bg2: #1a1f3a;
    --fg: #e8ecf8;
    --dim: #8a93b5;
    --accent: #ffb347;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--fg);
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  h1 {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    margin: 0 0 8px;
  }
  .stage {
    width: min(90vw, 720px);
    aspect-ratio: 16 / 9;
  }
  .readout {
    display: flex;
    gap: 48px;
    margin-top: 12px;
    font-variant-numeric: tabular-nums;
  }
  .stat { text-align: center; }
  .stat .label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 4px;
  }
  .stat .value { font-size: 28px; font-weight: 600; }
  .stat .unit { font-size: 13px; color: var(--dim); margin-left: 4px; }
  .status {
    margin-top: 16px;
    font-size: 12px;
    color: var(--dim);
    min-height: 1em;
  }
  .pole { stroke: #6b7280; stroke-width: 4; stroke-linecap: round; }
  .sock-band {
    stroke: none;
  }
  .sock-outline {
    fill: none;
    stroke: #7a1f1f;
    stroke-width: 0.5;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
</style>
</head>
<body>
  <h1>Solar Windsock</h1>
  <svg class="stage" viewBox="0 0 640 360" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
    <defs>
      <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#fff8d0" stop-opacity="1"/>
        <stop offset="40%" stop-color="#ffd76a" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#ffa500" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="earthOcean" cx="30%" cy="20%" r="90%">
        <stop offset="0%" stop-color="#6bb4e8"/>
        <stop offset="45%" stop-color="#2a75c0"/>
        <stop offset="85%" stop-color="#0e3878"/>
        <stop offset="100%" stop-color="#061e4a"/>
      </radialGradient>
      <radialGradient id="atmGlow" cx="50%" cy="50%" r="50%">
        <stop offset="85%" stop-color="#9ec8ff" stop-opacity="0"/>
        <stop offset="92%" stop-color="#9ec8ff" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#9ec8ff" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="earthTerminator" cx="30%" cy="15%" r="110%">
        <stop offset="55%" stop-color="#000" stop-opacity="0"/>
        <stop offset="100%" stop-color="#000" stop-opacity="0.45"/>
      </radialGradient>
      <radialGradient id="moonGround" cx="50%" cy="0%" r="100%">
        <stop offset="0%" stop-color="#8a8578"/>
        <stop offset="60%" stop-color="#4a4740"/>
        <stop offset="100%" stop-color="#2a2824"/>
      </radialGradient>
      <!-- Crater shading: lit floor toward lower-right, shadow toward upper-left (sun side) -->
      <radialGradient id="craterShade" cx="72%" cy="78%" r="75%">
        <stop offset="0%"   stop-color="#7a7566"/>
        <stop offset="55%"  stop-color="#3c3a33"/>
        <stop offset="100%" stop-color="#14120f"/>
      </radialGradient>
      <clipPath id="earthClip">
        <!-- Clip Earth to above the curved lunar horizon so no sky shows between them -->
        <path d="M -10 0 L 650 0 L 650 296 Q 320 279 -10 296 Z"/>
      </clipPath>
    </defs>

    <!-- Stars (fixed positions for a calm, non-twinkling sky) -->
    <g fill="#fff">
      <circle cx="40"  cy="30"  r="0.8"/>
      <circle cx="90"  cy="70"  r="0.6"/>
      <circle cx="160" cy="40"  r="1.1"/>
      <circle cx="220" cy="90"  r="0.7"/>
      <circle cx="275" cy="25"  r="0.9"/>
      <circle cx="330" cy="65"  r="0.6"/>
      <circle cx="380" cy="30"  r="1.2"/>
      <circle cx="435" cy="80"  r="0.7"/>
      <circle cx="500" cy="130" r="0.8"/>
      <circle cx="560" cy="50"  r="1.0"/>
      <circle cx="605" cy="95"  r="0.6"/>
      <circle cx="70"  cy="180" r="0.8"/>
      <circle cx="250" cy="160" r="0.7"/>
      <circle cx="410" cy="175" r="0.9"/>
      <circle cx="580" cy="210" r="0.6"/>
      <circle cx="20"  cy="250" r="0.7"/>
      <circle cx="150" cy="230" r="0.9"/>
      <circle cx="320" cy="250" r="0.6"/>
      <circle cx="485" cy="240" r="0.8"/>
    </g>

    <!-- Sun (high in the sky, upwind side) with soft glow -->
    <circle cx="70" cy="55" r="60" fill="url(#sunGlow)"/>
    <circle cx="70" cy="55" r="22" fill="#fffbe0"/>

    <!-- Earth rising behind the lunar horizon, clipped so only the upper portion shows -->
    <g clip-path="url(#earthClip)">
      <!-- Ocean base -->
      <circle cx="430" cy="305" r="70" fill="url(#earthOcean)"/>

      <!-- Continents: irregular organic shapes in green and arid browns -->
      <g opacity="0.9">
        <!-- Large landmass -->
        <path d="M 388 268 Q 398 260 412 262 Q 424 266 430 274 Q 424 281 412 282 Q 398 280 390 275 Q 384 271 388 268 Z"
              fill="#3d7a3a"/>
        <!-- Secondary landmass to the east -->
        <path d="M 445 255 Q 460 252 472 258 Q 478 265 470 270 Q 458 272 448 268 Q 442 262 445 255 Z"
              fill="#4a8840"/>
        <!-- Arid patch -->
        <path d="M 418 277 Q 432 274 444 279 Q 446 284 435 285 Q 422 284 418 281 Z"
              fill="#a8804a"/>
        <!-- Small island chain -->
        <path d="M 398 250 Q 405 248 411 251 Q 409 255 402 254 Q 397 253 398 250 Z"
              fill="#3d7a3a"/>
      </g>

      <!-- Polar ice cap at the top of the visible disc -->
      <path d="M 400 241 Q 430 236 460 241 Q 455 247 445 248 Q 430 250 415 248 Q 405 247 400 241 Z"
            fill="#f2f6fd" opacity="0.92"/>

      <!-- Cloud bands: swirling wisps across the face -->
      <g fill="#ffffff">
        <path d="M 382 263 Q 410 259 438 264 Q 460 266 476 262 Q 462 270 438 269 Q 410 267 385 269 Q 378 267 382 263 Z"
              opacity="0.35"/>
        <path d="M 395 276 Q 418 273 442 278 Q 436 282 418 282 Q 398 280 395 276 Z"
              opacity="0.28"/>
        <path d="M 410 252 Q 430 250 450 253 Q 438 256 422 255 Q 412 254 410 252 Z"
              opacity="0.4"/>
      </g>

      <!-- Terminator shading: sun is upper-left, so darken toward lower-right -->
      <circle cx="430" cy="305" r="70" fill="url(#earthTerminator)"/>

      <!-- Inner atmospheric rim -->
      <circle cx="430" cy="305" r="70" fill="none" stroke="#bcdcff" stroke-width="0.75" opacity="0.5"/>
    </g>
    <!-- Outer atmospheric glow sits outside the clip so it can feather into the sky -->
    <circle cx="430" cy="305" r="74" fill="url(#atmGlow)" clip-path="url(#earthClip)"/>

    <!-- Lunar surface: slightly curved horizon with a subtle gradient -->
    <path d="M -10 295 Q 320 278 650 295 L 650 360 L -10 360 Z" fill="url(#moonGround)"/>
    <!-- Craters (shading baked into the gradient) -->
    <g opacity="0.85">
      <ellipse cx="220" cy="332" rx="22" ry="4"  fill="url(#craterShade)"/>
      <ellipse cx="360" cy="345" rx="34" ry="5"  fill="url(#craterShade)"/>
      <ellipse cx="80"  cy="348" rx="18" ry="3.5" fill="url(#craterShade)"/>
      <ellipse cx="500" cy="338" rx="26" ry="4.5" fill="url(#craterShade)"/>
    </g>
    <!-- Horizon line accent -->
    <path d="M -10 295 Q 320 278 650 295" fill="none" stroke="#9a9588" stroke-width="0.75" opacity="0.6"/>

    <!-- Pole standing on the lunar surface -->
    <line class="pole" x1="200" y1="291" x2="200" y2="110"/>
    <!-- Crossbar ring -->
    <circle cx="200" cy="110" r="6" fill="none" stroke="#6b7280" stroke-width="2"/>
    <!-- Windsock bands (rendered by JS) -->
    <g id="sock"></g>
  </svg>

  <div class="readout">
    <div class="stat">
      <div class="label">Solar Wind</div>
      <div><span class="value" id="speed">—</span><span class="unit">km/s</span></div>
    </div>
    <div class="stat">
      <div class="label">Density</div>
      <div><span class="value" id="density">—</span><span class="unit">p/cm³</span></div>
    </div>
    <div class="stat">
      <div class="label">Kp Index</div>
      <div><span class="value" id="kp">—</span></div>
    </div>
  </div>
  <div class="status" id="status">Loading…</div>

<script>
const PLASMA_URL = 'https://services.swpc.noaa.gov/products/solar-wind/plasma-2-hour.json';
const KP_URL = 'https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json';

// State: speed in km/s drives flutter; we smoothly interpolate on updates.
let targetSpeed = 400;
let currentSpeed = 400;

const sockEl = document.getElementById('sock');
const speedEl = document.getElementById('speed');
const densityEl = document.getElementById('density');
const kpEl = document.getElementById('kp');
const statusEl = document.getElementById('status');

// Pole tip is at (120, 110). Windsock extends to the right.
const PIVOT_X = 200;
const PIVOT_Y = 110;
const SOCK_LENGTH = 260; // max extent in px
const MOUTH_RADIUS = 28;
const THROAT_RADIUS = 12; // far end

// Map speed (km/s) to an "extension" 0..1 (how horizontal the sock is).
// ~250 = limp, ~800 = fully extended.
function extension(speed) {
  const t = (speed - 250) / (650);
  return Math.max(0.05, Math.min(1, t));
}
// Flutter amplitude (px) and frequency (Hz) scale with speed.
function flutterAmp(speed)  { return 2 + 12 * extension(speed); }
function flutterFreq(speed) { return 0.6 + 5.0 * extension(speed); }

// Build a tapered sock as a series of stripes. Returns SVG path + stripe paths.
function renderSock(t, speed) {
  const ext = extension(speed);
  const amp = flutterAmp(speed);
  const freq = flutterFreq(speed);

  // Realistic windsock: stays straight/horizontal up to a break point, then
  // sags under gravity. Stronger wind pushes the break point further along.
  const N = 60;
  const pts = [];
  // breakS: fraction along the sock that stays stiff. At ext=1 the whole
  // sock is straight; at ext=0 it breaks almost immediately.
  const breakS = 0.1 + 0.9 * ext;
  const reach = SOCK_LENGTH * (0.35 + 0.65 * ext);
  for (let i = 0; i <= N; i++) {
    const s = i / N;
    const x = PIVOT_X + reach * s;
    // Before the break point the sock is nearly horizontal (slight upward
    // tilt from the hoop). Past it, gravity takes over with a parabolic sag.
    let drop = 0;
    if (s > breakS) {
      const past = (s - breakS) / (1 - breakS + 0.001);
      // past^2.5 rather than past²: centerline curvature is 0 at breakS
      // and ramps smoothly, so the inside-of-bend offset edge doesn't
      // cusp. Visually very close to past² droop; tip drop matches.
      drop = SOCK_LENGTH * 0.7 * (1 - ext) * past * past * Math.sqrt(past);
    }
    // Flutter: traveling wave, amplitude grows toward the tip.
    const wave = Math.sin((s * 2 - t * freq) * Math.PI * 2) * amp * s;
    const y = PIVOT_Y + drop + wave * (0.3 + 0.7 * ext);
    pts.push({ s, x, y });
  }

  // Build stripe polygons perpendicular to centerline.
  // Radius tapers from MOUTH_RADIUS at s=0 to THROAT_RADIUS at s=1.
  function radiusAt(s) { return MOUTH_RADIUS + (THROAT_RADIUS - MOUTH_RADIUS) * s; }

  // Precompute perpendicular offsets for each point.
  // Near the mouth we blend toward a purely vertical offset, because the
  // rigid hoop at the opening is viewed edge-on and should always span
  // (PIVOT_Y - r) to (PIVOT_Y + r), regardless of the sock's tangent.
  const offsets = pts.map((p, i) => {
    const prev = pts[Math.max(0, i - 1)];
    const next = pts[Math.min(pts.length - 1, i + 1)];
    const dx = next.x - prev.x;
    const dy = next.y - prev.y;
    const len = Math.hypot(dx, dy) || 1;
    // Pick the "top" side consistently (negative-y side of the tangent).
    let nx = dy / len;
    let ny = -dx / len;
    // Blend from vertical (at the mouth) to natural perpendicular along the body.
    // Smoothstep the blend so its slope is C¹ at the endpoints — a plain
    // linear ramp has a slope discontinuity at s=0.2 that shows up as a
    // visible kink on the inside of the bend.
    const u = Math.min(1, p.s / 0.2);
    const blend = u * u * (3 - 2 * u);
    nx = nx * blend;
    ny = ny * blend + (-1) * (1 - blend);
    const nlen = Math.hypot(nx, ny) || 1;
    nx /= nlen; ny /= nlen;
    const r = radiusAt(p.s);
    return { nx, ny, r };
  });

  const edges = pts.map((p, i) => {
    const o = offsets[i];
    return {
      top: [p.x + o.nx * o.r, p.y + o.ny * o.r],
      bot: [p.x - o.nx * o.r, p.y - o.ny * o.r],
    };
  });

  // On the inside of a sharp bend, r·d(perp)/ds can exceed d(center)/ds, so
  // the inside edge briefly reflexes (a vertex sits behind its predecessor
  // along the local tangent). Drop those samples from the polygon so the
  // outline chords straight across instead of drawing a V-notch. Top and bot
  // are filtered independently — a reflex on one side shouldn't drop good
  // samples from the other.
  const keepTop = new Array(N + 1).fill(true);
  const keepBot = new Array(N + 1).fill(true);
  let lastTop = 0, lastBot = 0;
  for (let i = 1; i <= N; i++) {
    const tx = pts[i].x - pts[i - 1].x;
    const ty = pts[i].y - pts[i - 1].y;
    const dtx = edges[i].top[0] - edges[lastTop].top[0];
    const dty = edges[i].top[1] - edges[lastTop].top[1];
    if (dtx * tx + dty * ty > 0) lastTop = i; else keepTop[i] = false;
    const dbx = edges[i].bot[0] - edges[lastBot].bot[0];
    const dby = edges[i].bot[1] - edges[lastBot].bot[1];
    if (dbx * tx + dby * ty > 0) lastBot = i; else keepBot[i] = false;
  }

  // 5 stripes alternating red/white, starting and ending on red.
  // Split by arc length so each band has equal visible length even where
  // the sock sags and the centerline stretches. Use fractional indices and
  // interpolate so stripe boundaries don't snap between samples as the sock
  // flutters.
  const STRIPES = 5;
  const colors = ['#c62828', '#f5f5f5'];
  const cumLen = [0];
  for (let i = 1; i <= N; i++) {
    const dx = pts[i].x - pts[i - 1].x;
    const dy = pts[i].y - pts[i - 1].y;
    cumLen.push(cumLen[i - 1] + Math.hypot(dx, dy));
  }
  const totalLen = cumLen[N];
  function fracIndexAtLen(L) {
    let lo = 0, hi = N;
    while (lo < hi) {
      const mid = (lo + hi) >> 1;
      if (cumLen[mid] < L) lo = mid + 1; else hi = mid;
    }
    if (lo === 0) return 0;
    const span = cumLen[lo] - cumLen[lo - 1];
    const t = span > 0 ? (L - cumLen[lo - 1]) / span : 0;
    return (lo - 1) + t;
  }
  function edgeAt(fi) {
    const i0 = Math.floor(fi);
    const i1 = Math.min(N, i0 + 1);
    const t = fi - i0;
    // Interpolate the top and bottom edge points directly so the boundary
    // vertex lies on the straight edge connecting the two adjacent samples'
    // edge points — otherwise the polygon's edge has a tiny kink at every
    // stripe boundary that reads as a visible cut on curved sections.
    const e0 = edges[i0], e1 = edges[i1];
    return {
      top: [e0.top[0] + (e1.top[0] - e0.top[0]) * t, e0.top[1] + (e1.top[1] - e0.top[1]) * t],
      bot: [e0.bot[0] + (e1.bot[0] - e0.bot[0]) * t, e0.bot[1] + (e1.bot[1] - e0.bot[1]) * t],
    };
  }
  let html = '';
  for (let k = 0; k < STRIPES; k++) {
    const fi0 = fracIndexAtLen((k / STRIPES) * totalLen);
    const fi1 = fracIndexAtLen(((k + 1) / STRIPES) * totalLen);
    const start = edgeAt(fi0);
    const end = edgeAt(fi1);
    // Skip integer samples at the endpoints to avoid duplicate vertices —
    // duplicates create zero-length edges whose rounded stroke joins render
    // as visible dots/notches at stripe boundaries and the sock tip.
    const iStart = Math.floor(fi0) + 1;
    const iEnd = Math.ceil(fi1) - 1;
    const topPts = [start.top];
    const botPts = [start.bot];
    for (let i = iStart; i <= iEnd; i++) {
      if (keepTop[i]) topPts.push(edges[i].top);
      if (keepBot[i]) botPts.push(edges[i].bot);
    }
    topPts.push(end.top);
    botPts.push(end.bot);
    const coords = topPts.concat(botPts.reverse()).map(([x, y]) => `${x.toFixed(2)},${y.toFixed(2)}`).join(' ');
    html += `<polygon class="sock-band" points="${coords}" fill="${colors[k % 2]}"/>`;
  }
  // Sock outline: one continuous stroke around the whole sock. Drawn over
  // the stripe fills so their internal boundaries meet cleanly without
  // visible per-stripe corner strokes (which used to render as little
  // notches at the inside of the bend where the stripe-end edge meets
  // the bot edge at an acute angle).
  const outlineTop = [edges[0].top];
  for (let i = 1; i <= N; i++) if (keepTop[i]) outlineTop.push(edges[i].top);
  const outlineBot = [edges[0].bot];
  for (let i = 1; i <= N; i++) if (keepBot[i]) outlineBot.push(edges[i].bot);
  const outlineCoords = outlineTop.concat(outlineBot.reverse())
    .map(([x, y]) => `${x.toFixed(2)},${y.toFixed(2)}`).join(' ');
  html += `<polygon class="sock-outline" points="${outlineCoords}"/>`;

  // Mouth hoop: viewed edge-on, a thin vertical ellipse at the pivot.
  html += `<ellipse cx="${PIVOT_X}" cy="${PIVOT_Y}" rx="3" ry="${MOUTH_RADIUS}" fill="#1a0505" opacity="0.5"/>`;
  html += `<ellipse cx="${PIVOT_X}" cy="${PIVOT_Y}" rx="3" ry="${MOUTH_RADIUS}" fill="none" stroke="#555" stroke-width="1.25"/>`;

  sockEl.innerHTML = html;
}

let lastFrame = performance.now();
function animate(now) {
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;
  // Smoothly interpolate displayed speed toward target.
  currentSpeed += (targetSpeed - currentSpeed) * Math.min(1, dt * 0.8);
  renderSock(now / 1000, currentSpeed);
  requestAnimationFrame(animate);
}
requestAnimationFrame((t) => { lastFrame = t; animate(t); });

// --- Data fetching ---

function parseTable(rows) {
  const header = rows[0];
  return rows.slice(1).map(r => Object.fromEntries(header.map((h, i) => [h, r[i]])));
}

function lastValid(records, key) {
  for (let i = records.length - 1; i >= 0; i--) {
    const v = parseFloat(records[i][key]);
    if (Number.isFinite(v)) return v;
  }
  return null;
}

async function fetchData() {
  try {
    const [plasmaRes, kpRes] = await Promise.all([
      fetch(PLASMA_URL, { cache: 'no-store' }),
      fetch(KP_URL, { cache: 'no-store' }),
    ]);
    if (!plasmaRes.ok) throw new Error('plasma ' + plasmaRes.status);
    if (!kpRes.ok) throw new Error('kp ' + kpRes.status);
    const plasmaRaw = await plasmaRes.json();
    const kpRaw = await kpRes.json();
    // Plasma is [headers, ...rows]; Kp is an array of objects.
    const plasma = parseTable(plasmaRaw);
    const kp = Array.isArray(kpRaw) && kpRaw.length && Array.isArray(kpRaw[0])
      ? parseTable(kpRaw)
      : kpRaw;

    const speed = lastValid(plasma, 'speed');
    const density = lastValid(plasma, 'density');
    // Kp product uses "Kp" or "kp_index" depending on endpoint; try both.
    const kpVal = lastValid(kp, 'Kp') ?? lastValid(kp, 'kp_index') ?? lastValid(kp, 'estimated_kp');

    if (speed != null) {
      targetSpeed = speed;
      speedEl.textContent = speed.toFixed(0);
    }
    if (density != null) densityEl.textContent = density.toFixed(1);
    if (kpVal != null) kpEl.textContent = kpVal.toFixed(1);

    const when = new Date().toLocaleTimeString();
    statusEl.textContent = `Updated ${when} · NOAA SWPC`;
  } catch (err) {
    statusEl.textContent = `Fetch failed: ${err.message}. Retrying…`;
  }
}

// Dev override: ?speed=700 pins the windsock to a given speed and skips fetching.
const override = new URLSearchParams(location.search).get('speed');
if (override !== null && Number.isFinite(parseFloat(override))) {
  const v = parseFloat(override);
  targetSpeed = v;
  currentSpeed = v;
  speedEl.textContent = v.toFixed(0);
  statusEl.textContent = `Preview mode: speed pinned to ${v} km/s`;
} else {
  fetchData();
  setInterval(fetchData, 60_000);
}
</script>
</body>
</html>
